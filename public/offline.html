<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
      background: #ffffff;
      color: #333;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      color: #666;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    p {
      color: #666;
      margin-bottom: 24px;
    }
    button {
      padding: 12px 24px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 1l22 22"></path>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
    <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
    <line x1="12" y1="20" x2="12.01" y2="20"></line>
  </svg>
  <h1 id="title">你已离线</h1>
  <p id="description">请检查你的网络连接后重试</p>
  <button id="retry" onclick="window.location.reload()">重试</button>

  <script>
    const translations = {
      zh: {
        title: "你已离线",
        description: "请检查你的网络连接后重试",
        retry: "重试"
      },
      en: {
        title: "You're offline",
        description: "Please check your internet connection and try again",
        retry: "Retry"
      }
    };

    const userLang = navigator.language || navigator.userLanguage;
    const locale = userLang.startsWith('zh') ? 'zh' : 'en';
    const t = translations[locale];

    document.getElementById('title').textContent = t.title;
    document.getElementById('description').textContent = t.description;
    document.getElementById('retry').textContent = t.retry;
    document.documentElement.lang = locale;
  </script>
</body>
</html>
